<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Prime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="chat-body">

  <!-- 헤더 -->
  <header class="chat-header">
    <div class="chat-header-inner">
      <div class="chat-header-left">
        <div class="logo-mark logo-mark--sm">
          <svg width="16" height="16" viewBox="0 0 28 28" fill="none">
            <path d="M7 9h14M7 14h10M7 19h12" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <p class="chat-header-name" id="headerName">로딩 중...</p>
          <p class="chat-header-grade" id="headerGrade"></p>
        </div>
      </div>
      <div class="chat-header-right">
        <button class="icon-btn" id="clearBtn" title="대화 초기화">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="logoutBtn" title="로그아웃">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <!-- 탭 바 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        AI 채팅
      </button>
      <button class="tab-btn" data-tab="study">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        오늘 학습 인증
      </button>
    </div>
  </header>

  <!-- ═══════════════ 채팅 탭 ═══════════════ -->
  <div class="tab-panel active" id="tabChat">
    <main class="chat-main" id="chatMain">
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-avatar" id="welcomeAvatar">?</div>
        <h2 class="welcome-title" id="welcomeName">안녕하세요!</h2>
        <p class="welcome-desc">궁금한 것을 무엇이든 물어보세요.<br />학습 분석, 질문, 개념 설명 모두 도와드려요.</p>
        <div class="welcome-chips">
          <button class="chip" data-msg="오늘 학습 계획 세워줘">📅 오늘 학습 계획</button>
          <button class="chip" data-msg="내 약점 과목 분석해줘">📊 약점 분석</button>
          <button class="chip" data-msg="이해 안 되는 개념 도와줘">💡 개념 설명</button>
          <button class="chip" data-msg="시험 대비 체크리스트 만들어줘">✅ 시험 대비</button>
        </div>
      </div>
      <div id="messagesList"></div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-bubble"><span></span><span></span><span></span></div>
      </div>
    </main>

    <footer class="chat-footer">
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="메시지를 입력하세요..." rows="1" maxlength="2000"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <p class="chat-footer-hint">AI가 잘못된 정보를 제공할 수 있습니다. 중요한 내용은 선생님께 확인하세요.</p>
    </footer>
  </div>

  <!-- ═══════════════ 학습 인증 탭 ═══════════════ -->
  <div class="tab-panel" id="tabStudy">
    <div class="study-container">

      <div class="study-form-card">
        <h2 class="study-section-title">📝 오늘 학습 인증</h2>
        <p class="study-section-desc">오늘 공부한 내용을 기록해두세요.</p>

        <!-- 사진 업로드 (선택) -->
        <div class="study-field">
          <label class="study-label">공부 사진 <span class="study-label-hint">선택</span></label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="studyFileInput" accept="image/*" capture="environment" hidden />
            <div class="upload-placeholder" id="uploadPlaceholder">
              <div class="upload-icon">📷</div>
              <p class="upload-text">탭하여 사진 추가</p>
              <p class="upload-subtext">JPEG, PNG, WEBP · 최대 15MB</p>
            </div>
            <img class="upload-preview" id="uploadPreview" alt="" />
          </div>
          <button class="btn-ghost-sm change-photo-btn" id="changeImageBtn" style="display:none">사진 변경</button>
        </div>

        <!-- 과목 -->
        <div class="study-field">
          <label class="study-label">과목 <span class="study-label-required">*</span></label>
          <select class="study-select" id="studySubject">
            <option value="">과목을 선택하세요</option>
            <option>수학</option><option>영어</option><option>국어</option>
            <option>과학</option><option>사회</option><option>역사</option>
            <option>물리</option><option>화학</option><option>생물</option>
            <option>지구과학</option><option>기타</option>
          </select>
        </div>

        <!-- 학습 시간 -->
        <div class="study-field">
          <label class="study-label">학습 시간 <span class="study-label-required">*</span></label>
          <div class="study-hours-grid">
            <button class="hours-chip" data-value="0.5">0.5시간</button>
            <button class="hours-chip" data-value="1">1시간</button>
            <button class="hours-chip" data-value="1.5">1.5시간</button>
            <button class="hours-chip" data-value="2">2시간</button>
            <button class="hours-chip" data-value="2.5">2.5시간</button>
            <button class="hours-chip" data-value="3">3시간</button>
            <button class="hours-chip" data-value="3.5">3.5시간</button>
            <button class="hours-chip" data-value="4">4시간</button>
            <button class="hours-chip" data-value="5">5시간</button>
            <button class="hours-chip" data-value="6">6시간+</button>
          </div>
          <input type="hidden" id="studyHours" value="" />
        </div>

        <!-- 메모 -->
        <div class="study-field">
          <label class="study-label">학습 내용 메모 <span class="study-label-hint">선택</span></label>
          <textarea class="study-textarea" id="studyMemo" placeholder="오늘 공부한 내용, 어려웠던 점 등을 적어보세요." rows="3" maxlength="500"></textarea>
        </div>

        <p class="study-form-error" id="studyFormError"></p>

        <button class="btn-primary btn-full" id="saveStudyBtn">
          <span id="saveBtnText">저장하기</span>
          <div class="btn-spinner" id="saveSpinner" style="display:none"></div>
        </button>
      </div>

      <!-- 학습 기록 -->
      <div class="today-logs" id="todayLogs">
        <h3 class="today-logs-title">📋 나의 학습 기록</h3>
        <div id="todayLogsList"><p class="empty-text">아직 학습 인증 기록이 없어요.</p></div>
      </div>

    </div>
  </div>

  <!-- 대화 초기화 모달 -->
  <div class="modal-overlay" id="clearModal">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3 class="modal-title">대화를 초기화할까요?</h3>
      <p class="modal-desc">모든 대화 이력이 삭제됩니다.<br />이 작업은 되돌릴 수 없어요.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn--cancel" id="clearCancel">취소</button>
        <button class="modal-btn modal-btn--confirm" id="clearConfirm">초기화</button>
      </div>
    </div>
  </div>

  <script src="/js/chat.js"></script>
</body>
</html>
